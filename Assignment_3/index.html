<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiya's To-Do List</title>
    <!-- Link CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header with Checklist Image -->
    <h1>
        <img src="assets/checklist.png" alt="Checklist" width="50">
        AH Creative To-Do List ✅
    </h1>

    <!-- Input Section -->
    <div class="input-container">
        <input type="text" id="taskInput" placeholder="Enter a task...">
        <button id="addTaskBtn">Add Task</button>
    </div>

    <!-- Task Counter -->
    <p id="taskCounter">Total Tasks: 0</p>

    <!-- Task List -->
    <ul id="taskList"></ul>

    <!-- Pop-up message -->
    <div id="message" class="hidden">Task added!</div>

    <!-- Audio for task completion and deletion -->
    <audio id="dingSound" src="assets/ding.mp3"></audio>
    <audio id="deleteSound" src="assets/delete.mp3"></audio>

    <!-- Link JS -->
    <script src="js/script.js"></script>
</body>
</html>
