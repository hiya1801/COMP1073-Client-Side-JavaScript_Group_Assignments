<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiya's To-Do List</title>
</head>
<body>
    <!-- Header -->
    <h1>
        <img src="assets/checklist.png" alt="Checklist" width="50">
        AH Creative To-Do List ✅
    </h1>

    <!-- Input Section -->
    <div class="input-container">
        <input type="text" id="taskInput" placeholder="Enter a task...">
        <button id="addTaskBtn">Add Task</button>
    </div>

    <!-- Task Counter -->
    <p id="taskCounter">Total Tasks: 0</p>

    <!-- Task List -->
    <ul id="taskList"></ul>

</body>
</html>
