<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather + Country Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Weather + Country Explorer</h1>
      <p class="subtitle">
        Search a city to view live weather data and country information.
      </p>
    </header>

    <section class="search-section">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter a city name..."
        aria-label="City name"
      />
      <button id="searchBtn">Search</button>
    </section>

    <p id="message" class="message"></p>

    <section class="cards">
      <div id="weatherCard" class="card hidden">
        <h2>Weather</h2>
        <div id="weatherContent"></div>
      </div>

      <div id="countryCard" class="card hidden">
        <h2>Country Info</h2>
        <div id="countryContent"></div>
      </div>
    </section>
